# ==========================================
# HikariCP Connection Pool Fixes
# ==========================================
# Maximum time (in ms) a connection can sit in the pool (9 minutes - beats Supabase's default timeout)
spring.datasource.hikari.max-lifetime=540000

# How long (in ms) a connection can sit idle before being retired (5 minutes)
spring.datasource.hikari.idle-timeout=300000

# Maximum amount of time (in ms) to wait for a connection from the pool (20 seconds)
spring.datasource.hikari.connection-timeout=20000

# Ping the database every 30 seconds to keep the connection alive
spring.datasource.hikari.keepalive-time=30000

# Pool sizing (keep this relatively small for transaction poolers)
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10

# ==========================================
# JPA & Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disables the "open-in-view" warning you were getting in your logs
spring.jpa.open-in-view=false